name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Test & TypeCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm ci

      - name: Run tests
        working-directory: api
        run: npm test

      - name: TypeScript check
        working-directory: api
        run: npx tsc --noEmit

  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}" \
          | grep -qE "^2" && echo "Deploy triggered" || (echo "Deploy webhook failed" && exit 1)
