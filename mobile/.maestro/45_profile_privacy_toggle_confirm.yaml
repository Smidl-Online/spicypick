appId: ${APP_ID}
---
- launchApp
- waitForAnimationToEnd

# Navigate to profile tab
- tapOn: "Profile"
- waitForAnimationToEnd

# Verify profile screen loaded
- assertVisible:
    id: "profile-screen"

# Toggle privacy if available
- assertVisible:
    id: "profile-privacy-toggle"
    optional: true
- tapOn:
    id: "profile-privacy-toggle"
    optional: true

- takeScreenshot: profile-privacy-toggle-confirm
