appId: ${APP_ID}
# SpicyPick App Store Screenshot Flow
# Captures 5 key screens for App Store / Google Play submission.
# Run via MacTester or locally: maestro test e2e/screenshots.yaml
# Screenshots land in: ~/.maestro/tests/<run-id>/screenshots/

---
# ── Screen 1: Daily Scenario ──────────────────────────────────────────────────
- launchApp:
    clearState: false

- waitForAnimationToEnd:
    timeout: 5000

# Make sure we're on the Today tab (main scenario screen)
- tapOn:
    text: "Today"
    optional: true

- waitForAnimationToEnd

- assertVisible:
    text: "Today"
    optional: true

- takeScreenshot: "01_daily_scenario"

# ── Screen 2: Vote Reveal ─────────────────────────────────────────────────────
# Tap any verdict button to reveal community results
- tapOn:
    text: "Guilty"
    optional: true

- waitForAnimationToEnd:
    timeout: 3000

- assertVisible:
    text: "Guilty|Not Guilty|Complicated|Both Wrong"
    optional: true

- takeScreenshot: "02_vote_reveal"

# ── Screen 3: Weekly League ───────────────────────────────────────────────────
- tapOn:
    text: "League"
    optional: true

- waitForAnimationToEnd:
    timeout: 3000

- assertVisible:
    text: "League"
    optional: true

- takeScreenshot: "03_league"

# ── Screen 4: Profile & Achievements ─────────────────────────────────────────
- tapOn:
    text: "Profile"
    optional: true

- waitForAnimationToEnd:
    timeout: 3000

- assertVisible:
    text: "Profile"
    optional: true

- takeScreenshot: "04_profile"

# ── Screen 5: Premium / Archive ───────────────────────────────────────────────
# Navigate to Premium screen (via Settings or dedicated tab)
- tapOn:
    text: "Settings"
    optional: true

- waitForAnimationToEnd

- tapOn:
    text: "Premium"
    optional: true

- waitForAnimationToEnd:
    timeout: 3000

- assertVisible:
    text: "Premium"
    optional: true

- takeScreenshot: "05_premium"
