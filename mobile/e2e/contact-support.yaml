appId: ${APP_ID}
---
# NOTE: This test submits a real support request via the API.
# The backend enforces a 3-per-hour rate limit per user.
# Run with a dedicated test account to avoid hitting the quota on repeated executions.
#
# Both outcomes are accepted as valid: success (HTTP 200) and rate-limited (HTTP 429).
# A 429 response still confirms the UI flow and endpoint are reachable.
- launchApp
- tapOn: "Profile"
- tapOn: "Settings"
- scrollDown
- tapOn: "Contact Support"
- assertVisible: "Contact Support"
- tapOn:
    id: "subject-input"
- inputText: "Test support message"
- tapOn:
    id: "message-input"
- inputText: "This is a test message from E2E test"
- tapOn: "Send Message"
# Assert that SOME response appeared — success (200) or rate-limit error (429) are both valid outcomes.
# Neither being visible would indicate a real regression (network failure, UI crash, etc.).
# Success (200): Alert shows t('support.success_message') = "Thank you! We will get back to you soon."
# Rate-limited (429): Alert shows err.message = "Too many requests. Please wait before sending another message."
- assertVisible:
    text: "Thank you"
    optional: true
- assertVisible:
    text: "Too many requests"
    optional: true
- assertTrue:
    condition: ${visible("Thank you") || visible("Too many requests")}
    label: "Support form must show either success or rate-limit response after submission"
